<!doctype html>

<title>Новый документ</title>

<body style="width: 100%; background-color: #000a24; color: #eee; font: 16px Raleway, 'Yandex Sans Text Regular', sans-serif">
<h1 style="text-align: center; font: 99px 'Avalon Medium','Segoe UI Variable Small Light', sans-serif; color: #fde910; line-height: 0px;">font-size in rem</h1>
rem — размер относительный к корневому шрифту. По умолчанию шрифт на странице равен 1rem.
<script type="text/javascript">
window.onload=function(){
//alert(document.documentElement.clientWidth)
}
</script>
<style type="text/css">
	:root {
    --responsive-width: 100px;
    --responsive-color: red;
    --root-font-size: 16px;
	font-size: 16px;
	color: white;
}

@media (min-width: 350px) {
    :root {
    --responsive-width: 150px;
    --responsive-color: green;
    --root-font-size: 24px;
	font-size: 24px;
    }
}

@media (min-width: 600px) {
    :root {
    --responsive-width: 250px;
    --responsive-color: blue;
    --root-font-size: 36px;
	font-size: 36px;
    }
}

@media (min-width: 950px) {
    :root {
    --responsive-width: 350px;
    --responsive-color: white;
    --root-font-size: 48px;
	font-size: 48px;
    }
}

.container {
    width: var(--responsive-width);
    color: var(--responsive-color);
    font-size: var(--responsive-font-size);
}

</style>

<div style="font-size: var(--root-font-size)">test – --root-font-size</div>
<br />
<div style="font-size: 1rem">test – 1rem</div>
<div style="font-size: 2rem">test – 2rem</div>
<div style="font-size: 3rem">test – 3rem</div>
<div style="font-size: 4rem">test – 4rem</div>
<div style="font-size: 5rem">test – 5rem</div>
<div style="font-size: 6rem">test – 6rem</div>
<div style="font-size: 7rem">test – 7rem</div>
<div style="font-size: 8rem">test – 8rem</div>
<div style="font-size: 9rem">test – 9rem</div>
<div style="font-size: 10rem">test – 10rem</div>


</body>
</html>
