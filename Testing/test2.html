<body style="width: 779px; margin: 19px auto; padding: 19px; background-color: #000a24; color: #eee; font: 16px Raleway, 'Yandex Sans Text Regular', sans-serif">

<script type="text/javascript">
window.onload=function(){
alert(document.documentElement.clientWidth)
}
</script>
<style type="text/css">
	:root {
    --responsive-width: 100px;
    --responsive-color: red;
    --responsive-font-size: 12px;
}

@media (min-width: 400px) {
    :root {
    --responsive-width: 150px;
    --responsive-color: green;
    --responsive-font-size: 24px;
    }
}

@media (min-width: 600px) {
    :root {
    --responsive-width: 250px;
    --responsive-color: blue;
    --responsive-font-size: 36px;
    }
}

@media (min-width: 1000px) {
    :root {
    --responsive-width: 350px;
    --responsive-color: white;
    --responsive-font-size: 48px;
    }
}

.container {
    width: var(--responsive-width);
    color: var(--responsive-color);
    font-size: var(--responsive-font-size);
}
</style>

<div class="container">
	test
</div>
