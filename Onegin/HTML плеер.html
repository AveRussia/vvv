<!DOCTYPE html>
<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<head>
<title>HTML плеер</title>
</head>
<body style="width: 779px; margin: 19px auto; padding: 19px; background-color: #000a24; color: #eee; font: 16px Raleway, 'Yandex Sans Text Regular', sans-serif">
<h1 style="text-align: center; font: 99px 'Avalon Medium','Segoe UI Variable Small Light', sans-serif; color: #fde910; line-height: 0px;">HTML плеер</h1>

<style type="text/css">
/* Specifies the size of the audio container */
audio {
  width: 115px;
  height: 25px;
}

audio::-webkit-media-controls-panel {
  -webkit-justify-content: center;
  height: 25px;
}

/* Removes the timeline */
audio::-webkit-media-controls-timeline {
  display: none !important;
}

/* Removes the time stamp */
audio::-webkit-media-controls-current-time-display {
  display: none;
}
audio::-webkit-media-controls-time-remaining-display {
  display: none;
}
/* Removes mute-button */
audio::-webkit-media-controls-mute-button {
  display: none;
}

/* Removes play-button 
audio::-webkit-media-controls-play-button {
  display: none;
}*/
</style>

<audio controls src='Шустрая черепашка.mp3' type='audio/mp3'></audio>

</body>
</html>
